<table class='education-table'>{% for row in rows %}<tr><td class='label'>{{ row.period }}</td><td{% if bold %} class='edu-name'{% endif %}>{{ row.name }}{% if row.institute %} — {{ row.institute }}{% endif %}</td><td class='edu-place'>{{ row.place or '' }}</td></tr>{% if row.description %}<tr><td class='label'>&nbsp;</td><td class='edu-desc' colspan='2'><div class='tekstblok'><p>{{ row.description }}</p></div></td></tr>{% endif %}{% endfor %}</table>
