period: 2018 – 2020
order: 20180101
organisation: Belastingdienst (Inkomensheffing)
role: Solution architect
activities: In het hoofdontwerpteam Inkomensheffing was ik medeverantwoordelijk voor het beschrijven van de solution op basis van de domeinarchitectuur; ik heb het team versterkt door een SOA-certificeringstraject te initiëren en de principes direct in de praktijk te brengen. Als projectarchitect voor Inkomensheffing was ik aanspreekpunt voor regelanalyse vraagstukken. Mijn kerntaken bestonden uit het opstellen van impactanalyses en het vastleggen van een referentiearchitectuur voor het realiseren van een servicegeoriënteerd landschap.
achievements: Architecten van het IH-domein gemotiveerd en geactiveerd om een servicegeoriënteerde aanpak te adopteren, waarmee de basis is gelegd voor een toekomstvaste architectuur.
keywords: Service Oriented Architecture, Regelanalyse, impactanalyse
